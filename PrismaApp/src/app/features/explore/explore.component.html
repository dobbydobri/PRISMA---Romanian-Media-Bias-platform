<div class="explore-page">

  <div class="explore-page__header">
    <h1 class="explore-page__title">Explorează</h1>
    <p class="explore-page__subtitle">
      Navighează prin categorii de conținut monitorizate de Prisma.
    </p>
  </div>

  <mat-tab-group
    animationDuration="200ms"
    class="explore-page__tabs"
    aria-label="Categorii explorare"
  >
    <mat-tab label="Politică">
      <ng-template matTabContent>
        <div class="explore-page__tab-content">
          <app-topic-tab topic="politics" />
        </div>
      </ng-template>
    </mat-tab>
    <mat-tab label="Economie">
      <ng-template matTabContent>
        <div class="explore-page__tab-content">
          <app-topic-tab topic="economy" />
        </div>
      </ng-template>
    </mat-tab>
    <mat-tab label="Afaceri externe">
      <ng-template matTabContent>
        <div class="explore-page__tab-content">
          <app-topic-tab topic="foreign_affairs" />
        </div>
      </ng-template>
    </mat-tab>
    <mat-tab label="Justiție">
      <ng-template matTabContent>
        <div class="explore-page__tab-content">
          <app-topic-tab topic="justice" />
        </div>
      </ng-template>
    </mat-tab>
    <mat-tab label="Sănătate">
      <ng-template matTabContent>
        <div class="explore-page__tab-content">
          <app-topic-tab topic="health" />
        </div>
      </ng-template>
    </mat-tab>
    <mat-tab label="Cultură">
      <ng-template matTabContent>
        <div class="explore-page__tab-content">
          <app-topic-tab topic="culture" />
        </div>
      </ng-template>
    </mat-tab>
    <mat-tab label="Social">
      <ng-template matTabContent>
        <div class="explore-page__tab-content">
          <app-topic-tab topic="social" />
        </div>
      </ng-template>
    </mat-tab>
    <mat-tab label="Mediu">
      <ng-template matTabContent>
        <div class="explore-page__tab-content">
          <app-topic-tab topic="environment" />
        </div>
      </ng-template>
    </mat-tab>
    <mat-tab label="Tehnologie">
      <ng-template matTabContent>
        <div class="explore-page__tab-content">
          <app-topic-tab topic="technology" />
        </div>
      </ng-template>
    </mat-tab>
    <mat-tab label="Fact-checking">
      <ng-template matTabContent>
        <div class="explore-page__tab-content">
          <app-fact-check-tab />
        </div>
      </ng-template>
    </mat-tab>
  </mat-tab-group>

</div>
